<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium background shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>

    <!-- Gradient for ENIGOV text if desired -->
    <linearGradient id="text_gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#141a77"/>
      <stop offset="100%" stop-color="#506edd"/>
    </linearGradient>
  </defs>

  <!-- App-style Background Squircle -->
  <rect width="512" height="512" rx="128" fill="#ffffff"/>
  <rect width="512" height="512" rx="128" fill="#f0f4ff" fill-opacity="0.5"/>
  <rect x="15" y="15" width="482" height="482" rx="113" stroke="#84a2ff" stroke-opacity="0.3" stroke-width="2"/>

  <g filter="url(#shadow)">
    <!-- Exact Logo from the site, perfectly centered -->
    <g transform="translate(46, 50) scale(4.2)">
      
      <!-- Pediment (Triangle Top) -->
      <!-- primary-600 -->
      <path d="M50 15 L15 35 H85 L50 15 Z" fill="#506edd" />
      
      <!-- Circle in Pediment -->
      <circle cx="50" cy="27" r="3" fill="#ffffff" fill-opacity="0.8" />

      <!-- Columns -->
      <!-- primary-500 -->
      <rect x="22" y="38" width="6" height="35" rx="1" fill="#648aff" />
      <rect x="40" y="38" width="6" height="35" rx="1" fill="#648aff" />
      <rect x="54" y="38" width="6" height="35" rx="1" fill="#648aff" />
      <rect x="72" y="38" width="6" height="35" rx="1" fill="#648aff" />

      <!-- Column Connectors (Header & Base) -->
      <!-- primary-400 -->
      <rect x="18" y="35" width="64" height="4" rx="1" fill="#84a2ff" />
      <!-- primary-600 -->
      <rect x="15" y="73" width="70" height="6" rx="2" fill="#506edd" />
      <!-- primary-700 -->
      <rect x="10" y="79" width="80" height="4" rx="2" fill="#3c52bb" />
      
    </g>
  </g>
</svg>
