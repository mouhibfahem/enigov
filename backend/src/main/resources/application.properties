spring.application.name=enigov

# PostgreSQL Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/enigov}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT Configuration
enigov.app.jwtSecret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_KEY}
enigov.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# CORS Configuration
enigov.app.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Multipart Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads
server.port=${PORT:8081}

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.transport.protocol=smtps
spring.mail.properties.mail.debug=false

# App URLs
enigov.app.frontendUrl=${FRONTEND_URL:http://localhost:5173}
enigov.app.fromEmail=${FROM_EMAIL:noreply@enigov.tn}
